buildscript {
  ext.DeviceMetrics = [
    kotlinVersion: "2.0.21",
    minSdkVersion: 24,
    compileSdkVersion: 36,
    targetSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    return rootProject.ext.has(prop)
      ? rootProject.ext.get(prop)
      : DeviceMetrics[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"
apply plugin: "com.facebook.react"

android {
  namespace "com.devicemetrics"

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
    targetSdkVersion getExtOrDefault("targetSdkVersion")
    consumerProguardFiles "consumer-rules.pro"
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }
}

repositories {
  google()
  mavenCentral()

  maven {
    url = uri("https://maven.pkg.github.com/lokal-app/device-telemetry-toolkit")
    credentials {
      username = System.getenv("GITHUB_USERNAME") ?: "lokal-app"
      password = System.getenv("GITHUB_TOKEN") ?: ""
    }
  }
}

dependencies {
  implementation "com.facebook.react:react-android"

  implementation("com.lokalapps:device-telemetry-toolkit:1.0.0") {
    exclude group: 'androidx.core', module: 'core-ktx'
    exclude group: 'androidx.core', module: 'core'
  }

  // device-telemetry-toolkit transitively pulls core-ktx:1.17.0 which requires compileSdk 36.
  // Excluding and pinning to 1.13.1 allows consumers on compileSdk 35 to build successfully.
  // Safe today because the SDK does not use APIs added after core-ktx 1.13.1.
  // TODO: Remove this workaround once all consumers are on compileSdk 36.
  implementation "androidx.core:core-ktx:1.13.1"
  implementation "androidx.core:core:1.13.1"
}
